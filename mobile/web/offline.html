<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYRON Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background: #020402;
            color: #8cff8c;
            font-family: "IBM Plex Mono", "Fira Code", monospace;
        }

        main {
            width: min(100%, 32rem);
            border: 1px solid rgba(57, 255, 114, 0.35);
            background: rgba(0, 12, 0, 0.9);
            padding: 1.5rem;
            box-shadow: 0 0 18px rgba(57, 255, 114, 0.08);
        }

        h1,
        p {
            margin: 0 0 1rem;
        }

        p:last-child {
            margin-bottom: 0;
            color: rgba(140, 255, 140, 0.72);
        }
    </style>
</head>
<body>
<main>
    <h1>Connection Lost</h1>
    <p>XYRON needs network access to create or join a live chat session.</p>
    <p>Reconnect to the internet and reopen the app when you are ready to continue.</p>
</main>
</body>
</html>
